name: NORA Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy NORA to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to EC2 and run deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NORA_EC2_HOST }}
          username: ${{ secrets.NORA_EC2_USER }}
          key: ${{ secrets.NORA_EC2_SSH_KEY }}
          port: ${{ secrets.NORA_EC2_PORT }}
          script_stop: true
          script: |
            cd /home/ubuntu/noma-project
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
