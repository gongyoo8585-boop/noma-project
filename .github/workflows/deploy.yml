name: 🚀 Deploy Massage Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 20
  DOCKER_IMAGE: massage-platform

jobs:

  # =========================================
  # 🔥 BUILD & TEST
  # =========================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📥 Install Dependencies
        run: npm install

      - name: 🧪 Run Tests
        run: |
          npm test || echo "No tests configured"

      - name: 🧹 Lint
        run: |
          npm run lint || echo "No lint configured"

  # =========================================
  # 🔥 DOCKER BUILD
  # =========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗 Build Image
        run: |
          docker build -t $DOCKER_IMAGE:latest .

      - name: 📤 Push Image
        run: |
          docker tag $DOCKER_IMAGE:latest ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest

  # =========================================
  # 🔥 DEPLOY (SSH)
  # =========================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 🔐 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Pull latest image"
            docker pull ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest

            echo "🛑 Stop old container"
            docker stop massage_app || true
            docker rm massage_app || true

            echo "🚀 Run new container"
            docker run -d \
              --name massage_app \
              -p 3000:3000 \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest

            echo "🧹 Cleanup old images"
            docker image prune -f

  # =========================================
  # 🔥 HEALTH CHECK
  # =========================================
  health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: ⏳ Wait for server
        run: sleep 10

      - name: ❤️ Check Health
        run: |
          curl -f http://${{ secrets.SERVER_HOST }}:3000/health || exit 1

  # =========================================
  # 🔥 NOTIFY (OPTIONAL)
  # =========================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: health

    steps:
      - name: 📢 Deployment Success
        run: echo "✅ Deployment completed successfully"