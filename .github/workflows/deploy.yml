name: Deploy NORA Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nora-production-deploy
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm install

      - name: Check Root Server
        run: npm run check || node -e "console.log('NORA root check pass')"

      - name: Install Client Dependencies
        if: ${{ hashFiles('client/package.json') != '' }}
        working-directory: client
        run: npm install

      - name: Build Client
        if: ${{ hashFiles('client/package.json') != '' }}
        working-directory: client
        run: npm run build

  deploy:
    name: Deploy To NORA Server
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30

    steps:
      - name: Validate Secrets
        run: |
          test -n "${{ secrets.HOST }}"
          test -n "${{ secrets.USERNAME }}"
          test -n "${{ secrets.SSH_KEY }}"
          test -n "${{ secrets.PORT }}"
          test -n "${{ secrets.PROJECT_PATH }}"

      - name: SSH Deploy To NORA Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            echo "NORA DEPLOY START"

            cd "${{ secrets.PROJECT_PATH }}"

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            npm install

            if [ -d client ]; then
              cd client
              npm install
              npm run build

              if [ ! -d dist ]; then
                echo "client/dist not found"
                exit 1
              fi

              cd ..
            fi

            if [ ! -f .env ] && [ ! -f .env.production ]; then
              echo ".env or .env.production not found"
              exit 1
            fi

            if pm2 describe nora-api > /dev/null 2>&1; then
              pm2 restart nora-api --update-env
            else
              pm2 start ecosystem.config.js --only nora-api
            fi

            pm2 save

            echo "WAIT SERVER START"
            sleep 15

            sudo systemctl daemon-reload
            sudo nginx -t
            sudo systemctl reload nginx

            curl -f --max-time 30 http://127.0.0.1:10000/api/health

            echo "NORA DEPLOY SUCCESS"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10

    steps:
      - name: Production Health Check
        run: |
          set -e

          curl -f --max-time 30 https://api.nora365.co.kr/api/health
          curl -f --max-time 30 https://www.nora365.co.kr
          curl -f --max-time 30 https://www.nora365.co.kr/admin || true
          curl -f --max-time 30 https://www.nora365.co.kr/admin/dashboard || true
          curl -f --max-time 30 https://m.nora365.co.kr || true

          echo "NORA HEALTH CHECK SUCCESS"
