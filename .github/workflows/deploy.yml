name: Deploy NORA Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nora-production-deploy
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Root Dependencies
        run: npm install

      - name: Check Root Server
        run: |
          if [ -f server.js ]; then
            node --check server.js
          fi

          if [ -f src/server.js ]; then
            node --check src/server.js
          fi

          npm run check || echo "NORA root check skipped"

      - name: Install Client Dependencies
        if: ${{ hashFiles('client/package.json') != '' }}
        working-directory: client
        run: |
          npm install
          npm install @rollup/rollup-linux-x64-gnu --save-dev || true
          chmod +x node_modules/.bin/vite || true

      - name: Build Client
        if: ${{ hashFiles('client/package.json') != '' }}
        working-directory: client
        env:
          CI: false
        run: npm run build

  deploy:
    name: Deploy To NORA Server
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30

    steps:
      - name: Validate Secrets
        run: |
          test -n "${{ secrets.HOST }}"
          test -n "${{ secrets.USERNAME }}"
          test -n "${{ secrets.SSH_KEY }}"
          test -n "${{ secrets.PORT }}"
          test -n "${{ secrets.PROJECT_PATH }}"

      - name: SSH Deploy To NORA Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e

            echo "=================================="
            echo "NORA DEPLOY START"
            echo "=================================="

            cd "${{ secrets.PROJECT_PATH }}"

            echo "=================================="
            echo "GIT SYNC"
            echo "=================================="

            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=.env --exclude=.env.production --exclude=uploads --exclude=client/dist

            echo "=================================="
            echo "ROOT INSTALL"
            echo "=================================="

            npm install

            echo "=================================="
            echo "SERVER SYNTAX CHECK"
            echo "=================================="

            if [ -f server.js ]; then
              node --check server.js
            fi

            if [ -f src/server.js ]; then
              node --check src/server.js
            fi

            echo "=================================="
            echo "CLIENT INSTALL AND BUILD"
            echo "=================================="

            if [ -d client ]; then
              cd client

              npm install
              npm install @rollup/rollup-linux-x64-gnu --save-dev || true
              chmod +x node_modules/.bin/vite || true

              CI=false npm run build

              if [ ! -d dist ]; then
                echo "client/dist not found"
                exit 1
              fi

              cd ..
            fi

            echo "=================================="
            echo "ENV CHECK"
            echo "=================================="

            if [ ! -f .env ] && [ ! -f .env.production ]; then
              echo ".env or .env.production not found"
              exit 1
            fi

            if ! grep -q "^JWT_SECRET=" .env .env.production 2>/dev/null; then
              echo "JWT_SECRET not found"
              exit 1
            fi

            echo "=================================="
            echo "PM2 RESTART"
            echo "=================================="

            if pm2 describe nora-api > /dev/null 2>&1; then
              pm2 restart ecosystem.config.js --only nora-api --env production --update-env
            else
              pm2 start ecosystem.config.js --only nora-api --env production
            fi

            pm2 save

            echo "=================================="
            echo "WAIT SERVER START"
            echo "=================================="

            sleep 20

            pm2 describe nora-api
            pm2 logs nora-api --lines 100 --nostream

            if ! pm2 pid nora-api > /dev/null 2>&1; then
              echo "nora-api pm2 pid not found"
              exit 1
            fi

            echo "=================================="
            echo "NGINX CHECK AND RELOAD"
            echo "=================================="

            sudo systemctl daemon-reload
            sudo nginx -t
            sudo systemctl reload nginx

            echo "=================================="
            echo "LOCAL API HEALTH CHECK"
            echo "=================================="

            for i in 1 2 3 4 5; do
              if curl -f --max-time 30 http://127.0.0.1:10000/api/health; then
                break
              fi

              if [ "$i" = "5" ]; then
                echo "local api health check failed"
                exit 1
              fi

              sleep 5
            done

            echo "=================================="
            echo "PUBLIC API HEALTH CHECK"
            echo "=================================="

            curl -f --max-time 30 https://api.nora365.co.kr/api/health

            echo "=================================="
            echo "NORA DEPLOY SUCCESS"
            echo "=================================="

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 10

    steps:
      - name: Production Health Check
        run: |
          set -e

          curl -f --max-time 30 https://api.nora365.co.kr/api/health
          curl -f --max-time 30 https://www.nora365.co.kr
          curl -f --max-time 30 https://www.nora365.co.kr/admin || true
          curl -f --max-time 30 https://www.nora365.co.kr/admin/dashboard || true
          curl -f --max-time 30 https://m.nora365.co.kr || true

          echo "NORA HEALTH CHECK SUCCESS"
