<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>NOMA (DEV UI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    .container {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      margin-bottom: 20px;
      color: #38bdf8;
    }

    button {
      padding: 12px 20px;
      margin: 6px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .login { background: #22c55e; }
    .kakao { background: #fee500; color: #000; }
    .danger { background: #ef4444; }
    .api { background: #3b82f6; }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
      width: 120px;
    }

    pre {
      margin-top: 20px;
      padding: 20px;
      background: #111;
      color: #0f0;
      text-align: left;
      overflow-x: auto;
      min-height: 150px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      margin-top: 10px;
      color: #38bdf8;
    }

    .token {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧪 NOMA DEV UI (src/public)</h1>

    <div>
      <input id="id" value="test" />
      <input id="pw" value="1234" />
    </div>

    <div>
      <button class="login" onclick="login()">로그인</button>
      <button class="kakao" onclick="kakao()">카카오</button>
      <button class="danger" onclick="logout()">로그아웃</button>
    </div>

    <div>
      <button class="api" onclick="health()">헬스</button>
      <button class="api" onclick="shops()">매장</button>
      <button class="api" onclick="stats()">통계</button>
      <button class="api" onclick="system()">시스템</button>
    </div>

    <div class="status" id="status">READY</div>
    <div class="token" id="token"></div>

    <pre id="out">READY</pre>
  </div>

  <script>
    const API = location.origin;
    let TOKEN = localStorage.getItem("token") || "";

    updateToken();

    function updateToken() {
      document.getElementById("token").innerText =
        TOKEN ? "TOKEN: " + TOKEN : "로그인 안됨";
    }

    function show(d) {
      document.getElementById("out").innerText =
        JSON.stringify(d, null, 2);
    }

    function setStatus(t) {
      document.getElementById("status").innerText = t;
    }

    async function request(url, opt = {}) {
      const start = Date.now();

      if (!opt.headers) opt.headers = {};
      if (TOKEN) {
        opt.headers.Authorization = "Bearer " + TOKEN;
      }

      try {
        const res = await fetch(API + url, opt);
        const data = await res.json();

        setStatus("응답: " + (Date.now() - start) + "ms");
        show(data);
        return data;

      } catch (e) {
        setStatus("에러");
        show({ error: e.message });
      }
    }

    async function login() {
      const id = document.getElementById("id").value;
      const pw = document.getElementById("pw").value;

      const d = await request("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, password: pw })
      });

      if (d?.token) {
        TOKEN = d.token;
        localStorage.setItem("token", TOKEN);
        updateToken();
      }
    }

    function kakao() {
      location.href = API + "/auth/kakao";
    }

    function logout() {
      TOKEN = "";
      localStorage.removeItem("token");
      updateToken();
      show({ msg: "로그아웃" });
    }

    async function health() {
      await request("/api/health");
    }

    async function shops() {
      await request("/api/shops");
    }

    async function stats() {
      await request("/api/admin/stats");
    }

    async function system() {
      await request("/api/system/status");
    }

    // 카카오 로그인 후 토큰 처리
    const params = new URLSearchParams(location.search);
    const token = params.get("token");

    if (token) {
      TOKEN = token;
      localStorage.setItem("token", token);
      updateToken();
      show({ msg: "카카오 로그인 성공", token });
      history.replaceState({}, "", "/");
    }

    // 자동 헬스 체크
    setInterval(async () => {
      try {
        const r = await fetch(API + "/api/health");
        if (!r.ok) throw new Error();
        setStatus("서버 정상");
      } catch {
        setStatus("서버 다운");
      }
    }, 10000);
  </script>
</body>
</html>
