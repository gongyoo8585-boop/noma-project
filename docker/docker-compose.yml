version: "3.9"

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:

  # ===================================================
  # 🔥 API SERVER
  # ===================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: massage-api
    restart: always

    ports:
      - "3000:3000"

    env_file:
      - ../.env

    environment:
      NODE_ENV: production
      PORT: 3000
      SERVER_HOST: https://api.yourdomain.com

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - app-network

    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/uploads

    # 🔥 healthcheck 수정 (wget 없음 → curl)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===================================================
  # 🔥 MONGODB
  # ===================================================
  mongo:
    image: mongo:6
    container_name: massage-mongo
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===================================================
  # 🔥 REDIS
  # ===================================================
  redis:
    image: redis:7-alpine
    container_name: massage-redis
    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    command: redis-server --appendonly yes

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===================================================
  # 🔥 MONGO EXPRESS
  # ===================================================
  mongo-express:
    image: mongo-express
    container_name: massage-mongo-admin
    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"

    depends_on:
      mongo:
        condition: service_healthy

    networks:
      - app-network

  # ===================================================
  # 🔥 NGINX
  # ===================================================
  nginx:
    image: nginx:latest
    container_name: massage-nginx
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - ../client/dist:/usr/share/nginx/html  # 🔥 프론트 정적파일 대응

    depends_on:
      - api
      - client

    networks:
      - app-network

  # ===================================================
  # 🔥 FRONTEND
  # ===================================================
  client:
    build:
      context: ../client
      dockerfile: Dockerfile

    container_name: massage-client
    restart: always

    # 🔥 외부 노출 제거 (nginx만 공개)
    expose:
      - "80"

    networks:
      - app-network