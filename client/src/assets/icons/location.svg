<svg
  width="72"
  height="72"
  viewBox="0 0 72 72"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter
      id="locationGlow"
      x="-50%"
      y="-50%"
      width="200%"
      height="200%"
    >
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="locationGradient" x1="0" y1="0" x2="72" y2="72">
      <stop offset="0%" stop-color="#FFE45C" />
      <stop offset="50%" stop-color="#FFC400" />
      <stop offset="100%" stop-color="#FF8A00" />
    </linearGradient>

    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF6BF" />
      <stop offset="100%" stop-color="#FFC400" />
    </radialGradient>
  </defs>

  <path
    d="M36 8C24.4 8 15 17.4 15 29C15 44.4 36 64 36 64C36 64 57 44.4 57 29C57 17.4 47.6 8 36 8Z"
    stroke="url(#locationGradient)"
    stroke-width="4"
    fill="rgba(255,196,0,0.08)"
    filter="url(#locationGlow)"
  />

  <circle
    cx="36"
    cy="29"
    r="7"
    fill="url(#innerGlow)"
    stroke="#FFF3A3"
    stroke-width="2"
    filter="url(#locationGlow)"
  />

  <circle
    cx="36"
    cy="29"
    r="16"
    stroke="#FFC400"
    stroke-opacity="0.35"
    stroke-width="2"
    filter="url(#locationGlow)"
  />
</svg>