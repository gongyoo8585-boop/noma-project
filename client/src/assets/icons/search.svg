<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <filter
      id="searchGlow"
      x="-50%"
      y="-50%"
      width="200%"
      height="200%"
    >
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="searchGradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#FFE45C" />
      <stop offset="50%" stop-color="#FFC400" />
      <stop offset="100%" stop-color="#FF8A00" />
    </linearGradient>
  </defs>

  <circle
    cx="28"
    cy="28"
    r="15"
    stroke="url(#searchGradient)"
    stroke-width="4"
    filter="url(#searchGlow)"
  />

  <path
    d="M39.5 39.5L51 51"
    stroke="url(#searchGradient)"
    stroke-width="5"
    stroke-linecap="round"
    filter="url(#searchGlow)"
  />
</svg>