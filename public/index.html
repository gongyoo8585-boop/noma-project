<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>맛집 FINAL</title>

  <!-- 카카오맵 -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&autoload=false"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    #map {
      width: 100%;
      height: 500px;
    }

    .status {
      padding: 10px;
      color: #aaa;
    }
  </style>
</head>

<body>

<h2>🔥 카카오 지도</h2>

<div id="map"></div>
<div class="status" id="status">위치 확인 중...</div>

<script>
kakao.maps.load(function () {

  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "❌ 위치 지원 안됨";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      const mapContainer = document.getElementById("map");

      const mapOption = {
        center: new kakao.maps.LatLng(lat, lng),
        level: 3,
      };

      const map = new kakao.maps.Map(mapContainer, mapOption);

      new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(lat, lng),
      });

      status.innerText = "✅ 위치 로딩 완료";
    },
    function (err) {
      status.innerText = "❌ 위치 권한 필요";
      console.error(err);
    }
  );

});
</script>

</body>
</html>
