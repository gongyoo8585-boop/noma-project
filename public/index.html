<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>🔥 맛집 PRO</title>

  <!-- ⭐ 카카오 지도 (services 반드시 포함) -->
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      padding: 15px;
      background: black;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin-right: 5px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: orange;
      cursor: pointer;
      font-weight: bold;
    }

    #map {
      width: 100%;
      height: 400px;
    }

    .list {
      padding: 10px;
    }

    .card {
      background: #222;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  <h2>🔥 맛집 PRO</h2>

  <!-- 로그인 -->
  <div>
    <input id="username" placeholder="아이디">
    <input id="password" type="password" placeholder="비밀번호">
    <button id="registerBtn">회원가입</button>
    <button id="loginBtn">로그인</button>
  </div>

  <!-- 검색 -->
  <div>
    <input id="keyword" placeholder="맛집 검색">
    <button id="searchBtn">검색</button>
    <button id="myBtn">내 맛집</button>
  </div>
</header>

<div id="map"></div>
<div class="list" id="list"></div>

<script>
let map;
let userLat, userLng;
let token = localStorage.getItem("token");

// ================= 지도 =================
navigator.geolocation.getCurrentPosition(pos => {
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;

  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(userLat, userLng),
    level: 3
  });

  new kakao.maps.Marker({
    map,
    position: new kakao.maps.LatLng(userLat, userLng)
  });
});

// ================= 이벤트 연결 =================
document.getElementById("registerBtn").addEventListener("click", register);
document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("searchBtn").addEventListener("click", searchPlace);
document.getElementById("myBtn").addEventListener("click", loadPlaces);

// ================= 회원가입 =================
async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    await fetch("/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username, password})
    });

    alert("회원가입 완료");
  } catch (e) {
    alert("회원가입 실패");
  }
}

// ================= 로그인 =================
async function login() {
  console.log("로그인 클릭됨");

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username, password})
    });

    const data = await res.json();

    if (!data.token) {
      alert("로그인 실패");
      return;
    }

    token = data.token;
    localStorage.setItem("token", token);

    alert("로그인 성공");
  } catch (e) {
    console.error(e);
    alert("로그인 에러");
  }
}

// ================= 검색 =================
function searchPlace() {
  const keyword = document.getElementById("keyword").value;

  const ps = new kakao.maps.services.Places();

  ps.keywordSearch(keyword, (data, status) => {
    if (status !== kakao.maps.services.Status.OK) return;

    data.forEach(place => {
      const marker = new kakao.maps.Marker({
        map,
        position: new kakao.maps.LatLng(place.y, place.x)
      });

      kakao.maps.event.addListener(marker, 'click', () => {
        savePlace(place);
      });
    });
  });
}

// ================= 저장 =================
async function savePlace(place) {
  if (!token) return alert("로그인 필요");

  await fetch("/places", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      name: place.place_name,
      lat: place.y,
      lng: place.x,
      rating: 5,
      review: "좋아요"
    })
  });

  alert("저장 완료");
}

// ================= 거리 계산 =================
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLng/2)*Math.sin(dLng/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ================= 리스트 =================
async function loadPlaces() {
  if (!token) return alert("로그인 필요");

  const res = await fetch("/places", {
    headers: { "Authorization": token }
  });

  let data = await res.json();

  data.forEach(p => {
    p.distance = getDistance(userLat, userLng, p.lat, p.lng);
  });

  data.sort((a,b)=>a.distance - b.distance);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    list.innerHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <p>⭐ ${p.rating}</p>
        <p>${p.review}</p>
        <p>📍 ${p.distance.toFixed(2)} km</p>
      </div>
    `;
  });
}
</script>

</body>
</html>
