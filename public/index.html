<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🔥 맛집 PRO</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services&autoload=false"></script>

<style>
body { margin:0; background:#111; color:#fff; font-family:sans-serif; }
#map { height:400px; }

.container { padding:10px; }

input, button {
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}

button { background:#ff9800; cursor:pointer; }

.card {
  background:#222;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 맛집 PRO</h2>

<!-- 로그인 UI -->
<input id="username" placeholder="아이디">
<input id="password" placeholder="비밀번호">
<button onclick="register()">회원가입</button>
<button onclick="login()">로그인</button>

<br>

<!-- 검색 -->
<input id="keyword" placeholder="맛집 검색">
<button onclick="search()">검색</button>

<div id="map"></div>

<h3>📍 내 맛집</h3>
<div id="list"></div>

</div>

<script>
let map, ps, token="";
let myLat, myLng;

/* ===== 거리 계산 ===== */
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ===== 지도 ===== */
kakao.maps.load(function () {

  navigator.geolocation.getCurrentPosition(pos => {

    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;

    map = new kakao.maps.Map(document.getElementById("map"), {
      center: new kakao.maps.LatLng(myLat, myLng),
      level: 3
    });

    ps = new kakao.maps.services.Places();

  });

});

/* ===== 검색 ===== */
function search() {

  ps.keywordSearch(keyword.value, (data, status) => {

    if (status === kakao.maps.services.Status.OK) {

      data.forEach(p => {

        const marker = new kakao.maps.Marker({
          map: map,
          position: new kakao.maps.LatLng(p.y, p.x)
        });

        kakao.maps.event.addListener(marker, "click", () => {

          const rating = prompt("별점");
          const review = prompt("리뷰");

          save(p.place_name, p.y, p.x, rating, review);
        });

      });

    }
  });

}

/* ===== 저장 ===== */
function save(name, lat, lng, rating, review) {

  if (!token) return alert("로그인 필요");

  const form = new FormData();
  form.append("name", name);
  form.append("lat", lat);
  form.append("lng", lng);
  form.append("rating", rating);
  form.append("review", review);

  fetch("/places", {
    method:"POST",
    headers:{ "Authorization":token },
    body: form
  }).then(()=> load());
}

/* ===== 로드 + 거리순 ===== */
function load() {

  fetch("/places", {
    headers:{ "Authorization":token }
  })
  .then(res=>res.json())
  .then(data=>{

    list.innerHTML="";

    data
    .map(p=>{
      p.distance = getDistance(myLat,myLng,p.lat,p.lng);
      return p;
    })
    .sort((a,b)=> a.distance - b.distance) // ⭐ 거리순
    .forEach(p=>{

      list.innerHTML += `
        <div class="card">
          📍 ${p.name}
          <br>⭐ ${p.rating}
          <br>거리: ${p.distance.toFixed(2)} km
          <br>${p.review}
          <br>
          <button onclick="fav('${p._id}')">❤️</button>
          <button onclick="del('${p._id}')">삭제</button>
          <button onclick="share('${p.name}')">공유</button>
        </div>
      `;

    });

  });
}

/* ===== 기능 ===== */
function fav(id){
  fetch("/favorite/"+id,{method:"PATCH",headers:{Authorization:token}})
  .then(()=> load());
}

function del(id){
  fetch("/places/"+id,{method:"DELETE",headers:{Authorization:token}})
  .then(()=> load());
}

function share(name){
  navigator.clipboard.writeText(name);
  alert("복사됨");
}

/* ===== 회원 ===== */
function register(){
  fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username.value,password:password.value})});
}

function login(){
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username.value,password:password.value})})
  .then(res=>res.json())
  .then(d=>{token=d.token; load();});
}
</script>

</body>
</html>
