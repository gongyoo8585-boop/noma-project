<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 마장 FINAL</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">🔥 마장 FINAL</div>

      <div class="search-area">
        <input id="keywordInput" type="text" placeholder="맛집 이름 실시간 검색" />
        <button id="searchBtn" class="btn btn-primary">검색</button>
        <button id="reloadBtn" class="btn btn-dark">새로고침</button>
      </div>

      <div class="auth-area">
        <div id="guestBox" class="auth-buttons">
          <button id="openLoginBtn" class="btn btn-dark">로그인</button>
          <button id="openRegisterBtn" class="btn btn-primary">회원가입</button>
        </div>

        <div id="userBox" class="user-box hidden">
          <span id="userGreeting"></span>
          <button id="logoutBtn" class="btn btn-danger">로그아웃</button>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="map-section card">
        <div class="map-header">
          <div>
            <div class="section-title">🗺️ 카카오맵</div>
            <div id="statusText" class="muted">위치 확인 중...</div>
          </div>
          <div class="chip-row">
            <span id="resultCountChip" class="chip">주변 맛집 0개</span>
          </div>
        </div>
        <div id="map"></div>
      </section>

      <section class="grid-2">
        <section class="card list-section">
          <div class="section-title">📍 주변 맛집</div>
          <div id="restaurantList" class="list"></div>
        </section>

        <section class="card list-section">
          <div class="section-title">⭐ 저장한 맛집</div>
          <div id="favoriteList" class="list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="authModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <button id="closeAuthModalBtn" class="close-btn">✕</button>

      <div class="tab-row">
        <button id="loginTabBtn" class="tab-btn active">로그인</button>
        <button id="registerTabBtn" class="tab-btn">회원가입</button>
      </div>

      <form id="loginForm" class="form-box">
        <h3>로그인</h3>
        <input id="loginAccount" type="text" placeholder="아이디 또는 이메일" required />
        <input id="loginPassword" type="password" placeholder="비밀번호" required />
        <button class="btn btn-primary full" type="submit">로그인</button>
      </form>

      <form id="registerForm" class="form-box hidden">
        <h3>회원가입</h3>
        <input id="registerUsername" type="text" placeholder="아이디" required />
        <input id="registerEmail" type="email" placeholder="이메일" required />
        <input id="registerPassword" type="password" placeholder="비밀번호" required />
        <button class="btn btn-primary full" type="submit">회원가입</button>
      </form>
    </div>
  </div>

  <div id="detailModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card detail-card">
      <button id="closeDetailModalBtn" class="close-btn">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
