<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>🔥 마장 FINAL</title>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      padding: 15px;
      background: #000;
    }

    .logo {
      font-weight: bold;
      margin-right: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: orange;
      color: black;
      cursor: pointer;
    }

    #map {
      width: 100%;
      height: 90vh;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">🔥 마장 FINAL</div>
  <input id="search" placeholder="맛집 이름 검색">
  <button onclick="searchPlace()">검색</button>
</header>

<div id="map"></div>

<script>
  let map;
  let ps;
  let infowindow;

  function initMap(lat, lng) {
    const container = document.getElementById('map');
    const options = {
      center: new kakao.maps.LatLng(lat, lng),
      level: 3
    };

    map = new kakao.maps.Map(container, options);
    ps = new kakao.maps.services.Places();
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    searchNearby(lat, lng);
  }

  function searchNearby(lat, lng) {
    const loc = new kakao.maps.LatLng(lat, lng);

    ps.keywordSearch("맛집", placesSearchCB, {
      location: loc,
      radius: 1000
    });
  }

  function searchPlace() {
    const keyword = document.getElementById('search').value;

    if (!keyword) return;

    ps.keywordSearch(keyword, placesSearchCB);
  }

  function placesSearchCB(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      displayPlaces(data);
    }
  }

  function displayPlaces(places) {
    for (let i = 0; i < places.length; i++) {
      const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);

      const marker = new kakao.maps.Marker({
        map: map,
        position: placePosition
      });

      kakao.maps.event.addListener(marker, 'click', function () {
        infowindow.setContent(`<div style="padding:5px;">${places[i].place_name}</div>`);
        infowindow.open(map, marker);
      });
    }
  }

  // 🔥 핵심 (위치 가져오기)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      console.log("위치 성공:", lat, lng);

      initMap(lat, lng);
    }, function(error) {
      console.log("위치 실패 → 기본 서울");

      initMap(37.5665, 126.9780);
    });
  } else {
    initMap(37.5665, 126.9780);
  }
</script>

</body>
</html>
