<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>맛집 PRO</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28"></script>

</head>

<body style="margin:0;background:#111;color:white;font-family:Arial">

<header style="padding:10px;background:black;">
  <h2>🔥 맛집 PRO</h2>

  <input id="username" placeholder="아이디">
  <input id="password" type="password" placeholder="비밀번호">

  <button onclick="register()">회원가입</button>
  <button onclick="login()">로그인</button>
  <button onclick="kakaoLogin()">카카오 로그인</button>
</header>

<div id="map" style="width:100%;height:400px;"></div>

<script>
const API = "https://noma-project-1.onrender.com";

// 회원가입
function register(){
  fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(()=>alert("회원가입 완료"));
}

// 로그인
function login(){
  fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      localStorage.setItem("token", data.token);
      alert("로그인 성공");
    } else {
      alert("로그인 실패");
    }
  });
}

// 카카오 로그인
function kakaoLogin(){
  window.location.href = API + "/kakao/login";
}

// 지도
navigator.geolocation.getCurrentPosition(pos=>{
  const map = new kakao.maps.Map(document.getElementById("map"), {
    center: new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude),
    level: 3
  });
});
</script>

</body>
</html>
