<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>🔥 마장 FINAL</title>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services"></script>

  <style>
    body { margin:0; background:#111; color:white; font-family:Arial; }
    header { display:flex; padding:15px; background:#000; }
    input { flex:1; padding:10px; margin-right:10px; }
    button { padding:10px; background:orange; border:none; }
    #map { width:100%; height:90vh; }
  </style>
</head>

<body>

<header>
  <div>🔥 마장 FINAL</div>
  <input id="search" placeholder="맛집 검색">
  <button onclick="searchPlace()">검색</button>
</header>

<div id="map"></div>

<script>
let map, ps, infowindow;

function initMap(lat, lng) {
  const container = document.getElementById('map');
  const options = {
    center: new kakao.maps.LatLng(lat, lng),
    level: 3
  };

  map = new kakao.maps.Map(container, options);
  ps = new kakao.maps.services.Places();
  infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

  searchNearby(lat, lng);
}

function searchNearby(lat, lng) {
  const loc = new kakao.maps.LatLng(lat, lng);

  ps.keywordSearch("맛집", placesSearchCB, {
    location: loc,
    radius: 1000
  });
}

function searchPlace() {
  const keyword = document.getElementById('search').value;
  if (!keyword) return;
  ps.keywordSearch(keyword, placesSearchCB);
}

function placesSearchCB(data, status) {
  if (status === kakao.maps.services.Status.OK) {
    displayPlaces(data);
  }
}

function displayPlaces(places) {
  for (let i = 0; i < places.length; i++) {
    const marker = new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(places[i].y, places[i].x)
    });

    kakao.maps.event.addListener(marker, 'click', function () {
      infowindow.setContent(`<div style="padding:5px;">${places[i].place_name}</div>`);
      infowindow.open(map, marker);
    });
  }
}

// 🔥 위치 가져오기
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(function(pos) {
    initMap(pos.coords.latitude, pos.coords.longitude);
  }, function() {
    initMap(37.5665, 126.9780);
  });
} else {
  initMap(37.5665, 126.9780);
}
</script>

</body>
</html>
