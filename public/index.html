<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🔥 맛집 FINAL</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services&autoload=false"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
#map { width:100%; height:500px; }
input, button { margin:5px; padding:5px; }
.card { background:#111; margin:5px; padding:5px; }
</style>
</head>

<body>

<h2>🔥 맛집 앱 완성</h2>

<div>
  <input id="username" placeholder="아이디">
  <input id="password" placeholder="비밀번호">
  <button onclick="register()">회원가입</button>
  <button onclick="login()">로그인</button>
</div>

<input id="keyword" placeholder="맛집 검색">
<button onclick="search()">검색</button>

<div id="map"></div>

<h3>📌 내 저장 맛집</h3>
<div id="list"></div>

<script>
let map;
let ps;
let token = "";
let myMarkers = [];

kakao.maps.load(function () {

  navigator.geolocation.getCurrentPosition(function (pos) {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map = new kakao.maps.Map(document.getElementById("map"), {
      center: new kakao.maps.LatLng(lat, lng),
      level: 3
    });

    ps = new kakao.maps.services.Places();

  });

});

/* ===== 검색 ===== */
function search() {
  const keyword = document.getElementById("keyword").value;

  ps.keywordSearch(keyword, function (data, status) {
    if (status === kakao.maps.services.Status.OK) {

      data.forEach(place => {

        const marker = new kakao.maps.Marker({
          map: map,
          position: new kakao.maps.LatLng(place.y, place.x)
        });

        kakao.maps.event.addListener(marker, 'click', function () {
          save(place.place_name, place.y, place.x);
        });

      });

    }
  });
}

/* ===== 저장 ===== */
function save(name, lat, lng) {

  if (!token) return alert("로그인 필요");

  fetch("/places", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body: JSON.stringify({ name, lat, lng })
  })
  .then(()=> {
    alert("저장 완료");
    loadMyPlaces();
  });
}

/* ===== 불러오기 ===== */
function loadMyPlaces() {

  fetch("/places", {
    headers:{ "Authorization":token }
  })
  .then(res=>res.json())
  .then(data=>{

    document.getElementById("list").innerHTML = "";

    data.forEach(p => {

      new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(p.lat, p.lng)
      });

      document.getElementById("list").innerHTML += `
        <div class="card">
          ${p.name}
          <button onclick="del('${p._id}')">삭제</button>
        </div>
      `;
    });

  });
}

/* ===== 삭제 ===== */
function del(id) {

  fetch("/places/"+id, {
    method:"DELETE",
    headers:{ "Authorization":token }
  })
  .then(()=> loadMyPlaces());
}

/* ===== 회원가입 ===== */
function register() {
  fetch("/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  }).then(()=>alert("회원가입 완료"));
}

/* ===== 로그인 ===== */
function login() {
  fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    token = data.token;
    alert("로그인 성공");
    loadMyPlaces();
  });
}
</script>

</body>
</html>
