<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>맛집 PRO</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_JS키"></script>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;}
header{padding:10px;background:#000;}
input,button{padding:8px;margin:3px;}
#map{width:100%;height:400px;}
</style>
</head>

<body>

<header>
<input id="id" placeholder="아이디">
<input id="pw" type="password" placeholder="비번">
<button onclick="register()">회원가입</button>
<button onclick="login()">로그인</button>
<button onclick="kakaoLogin()">카카오 로그인</button>
</header>

<div id="map"></div>
<div id="list"></div>

<script>

let token = "";

/* ===== 카카오 토큰 받기 ===== */
const urlParams = new URLSearchParams(location.search);
if(urlParams.get("token")){
  token = urlParams.get("token");
  alert("카카오 로그인 성공");
}

/* ===== 회원가입 ===== */
async function register(){
  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:id.value,
      password:pw.value
    })
  });
  alert("가입 완료");
}

/* ===== 로그인 ===== */
async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:id.value,
      password:pw.value
    })
  });

  const data = await res.json();

  if(!data.token){
    alert("로그인 실패");
    return;
  }

  token = data.token;
  alert("로그인 성공");
}

/* ===== 카카오 로그인 ===== */
function kakaoLogin(){
  location.href="/kakao";
}

/* ===== 지도 ===== */
navigator.geolocation.getCurrentPosition(pos=>{
  const map = new kakao.maps.Map(document.getElementById("map"),{
    center: new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude),
    level:3
  });
});

</script>

</body>
</html>
