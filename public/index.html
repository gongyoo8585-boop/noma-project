<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맛집 FINAL</title>

  <!-- 카카오맵 SDK -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&autoload=false"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    header {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    #map {
      width: 100%;
      height: 500px;
      background: #222;
    }

    .status {
      padding: 10px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>🔥 맛집 FINAL</header>

<div id="map"></div>
<div class="status" id="status">위치 확인 중...</div>

<script>
kakao.maps.load(function () {

  const status = document.getElementById("status");

  if (!navigator.geolocation) {
    status.innerText = "❌ 위치 지원 안됨";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function (position) {

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      const container = document.getElementById("map");

      const options = {
        center: new kakao.maps.LatLng(lat, lng),
        level: 3,
      };

      const map = new kakao.maps.Map(container, options);

      new kakao.maps.Marker({
        map: map,
        position: new kakao.maps.LatLng(lat, lng),
      });

      status.innerText = "✅ 위치 로딩 완료";

      console.log("지도 정상 작동");
    },
    function (error) {
      status.innerText = "❌ 위치 권한 필요";
      console.error(error);
    }
  );

});
</script>

</body>
</html>
