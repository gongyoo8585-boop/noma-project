<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🔥 마장 FINAL</title>

<!-- 🔥 카카오 지도 (수정 완료 버전) -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services&autoload=false"></script>

<style>
body { margin:0; background:#111; color:white; }
#map { width:100%; height:100vh; }
</style>
</head>

<body>

<div id="map"></div>

<script>
let map, ps;

function initMap(lat, lng) {
  const container = document.getElementById('map');

  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(lat, lng),
    level: 3
  });

  ps = new kakao.maps.services.Places();

  ps.keywordSearch("맛집", function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      data.forEach(place => {
        new kakao.maps.Marker({
          map: map,
          position: new kakao.maps.LatLng(place.y, place.x)
        });
      });
    }
  });
}

// 🔥 반드시 이 구조 (autoload=false 대응)
kakao.maps.load(function () {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      initMap(pos.coords.latitude, pos.coords.longitude);
    }, function() {
      initMap(37.5665, 126.9780);
    });
  } else {
    initMap(37.5665, 126.9780);
  }
});
</script>

</body>
</html>
