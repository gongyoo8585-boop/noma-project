<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🔥 맛집 완성판</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=290ec1ed8354f004a77502dfef5cbd28&libraries=services&autoload=false"></script>

<style>
body { background:#000; color:#fff; margin:0; }
#map { height:500px; }
.card { background:#111; margin:5px; padding:5px; }
img { width:100px; }
</style>
</head>

<body>

<h2>🔥 맛집 끝판왕</h2>

<input id="username" placeholder="아이디">
<input id="password" placeholder="비밀번호">
<button onclick="register()">가입</button>
<button onclick="login()">로그인</button>

<br>

<input id="keyword" placeholder="검색">
<button onclick="search()">검색</button>

<div id="map"></div>

<h3>📌 저장 목록</h3>
<div id="list"></div>

<script>
let map, ps, token = "";

kakao.maps.load(function () {

  navigator.geolocation.getCurrentPosition(pos => {

    map = new kakao.maps.Map(document.getElementById("map"), {
      center: new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude),
      level: 3
    });

    ps = new kakao.maps.services.Places();

  });

});

/* ===== 검색 ===== */
function search() {

  ps.keywordSearch(keyword.value, (data, status) => {

    if (status === kakao.maps.services.Status.OK) {

      data.forEach(p => {

        const marker = new kakao.maps.Marker({
          map: map,
          position: new kakao.maps.LatLng(p.y, p.x)
        });

        kakao.maps.event.addListener(marker, "click", () => {

          const rating = prompt("별점 (1~5)");
          const review = prompt("리뷰 입력");

          save(p.place_name, p.y, p.x, rating, review);
        });

      });

    }
  });

}

/* ===== 저장 ===== */
function save(name, lat, lng, rating, review) {

  if (!token) return alert("로그인");

  const form = new FormData();
  form.append("name", name);
  form.append("lat", lat);
  form.append("lng", lng);
  form.append("rating", rating);
  form.append("review", review);

  fetch("/places", {
    method:"POST",
    headers:{ "Authorization":token },
    body: form
  }).then(()=> load());
}

/* ===== 불러오기 ===== */
function load() {

  fetch("/places", {
    headers:{ "Authorization":token }
  })
  .then(res=>res.json())
  .then(data=>{

    list.innerHTML = "";

    data
    .sort((a,b)=> b.rating - a.rating) // ⭐ 정렬
    .forEach(p => {

      list.innerHTML += `
        <div class="card">
          ⭐ ${p.rating} - ${p.name} ${p.favorite ? "❤️" : ""}
          <br>${p.review}
          <br><img src="/uploads/${p.image}">
          <br>
          <button onclick="fav('${p._id}')">즐겨찾기</button>
          <button onclick="del('${p._id}')">삭제</button>
          <button onclick="share('${p.name}')">공유</button>
        </div>
      `;
    });

  });
}

/* ===== 기능 ===== */
function fav(id){
  fetch("/favorite/"+id,{method:"PATCH",headers:{Authorization:token}})
  .then(()=> load());
}

function del(id){
  fetch("/places/"+id,{method:"DELETE",headers:{Authorization:token}})
  .then(()=> load());
}

function share(name){
  navigator.clipboard.writeText(name);
  alert("복사됨");
}

/* ===== 회원 ===== */
function register(){
  fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username.value,password:password.value})});
}

function login(){
  fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:username.value,password:password.value})})
  .then(res=>res.json())
  .then(d=>{token=d.token; load();});
}
</script>

</body>
</html>
