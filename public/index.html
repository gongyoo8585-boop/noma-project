<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>맛집 PRO</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=여기에_JS키"></script>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;}
header{padding:10px;background:#000;}
input,button{padding:8px;margin:3px;}
#map{width:100%;height:400px;}
</style>
</head>

<body>

<header>
<input id="id" placeholder="아이디">
<input id="pw" type="password" placeholder="비번">
<button onclick="register()">회원가입</button>
<button onclick="login()">로그인</button>
<button onclick="kakaoLogin()">카카오 로그인</button>
</header>

<div id="map"></div>
<div id="list"></div>

<script>

let token = "";

/* ===== 회원가입 ===== */
async function register(){
  await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("id").value,
      password:document.getElementById("pw").value
    })
  });
  alert("가입 완료");
}

/* ===== 로그인 ===== */
async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("id").value,
      password:document.getElementById("pw").value
    })
  });

  const data = await res.json();
  token = data.token;
  alert("로그인 성공");
  load();
}

/* ===== 카카오 로그인 ===== */
function kakaoLogin(){
  location.href = "/kakao";
}

/* ===== 지도 ===== */
navigator.geolocation.getCurrentPosition(pos=>{
  const map = new kakao.maps.Map(document.getElementById("map"),{
    center: new kakao.maps.LatLng(pos.coords.latitude,pos.coords.longitude),
    level:3
  });

  kakao.maps.event.addListener(map,"click",function(mouseEvent){
    const latlng = mouseEvent.latLng;

    const name = prompt("맛집 이름?");
    if(!name) return;

    fetch("/place",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":token
      },
      body:JSON.stringify({
        name,
        lat:latlng.getLat(),
        lng:latlng.getLng()
      })
    }).then(()=>load());
  });
});

/* ===== 리스트 ===== */
async function load(){
  const res = await fetch("/place",{
    headers:{Authorization:token}
  });

  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.map(p=>`<div>${p.name}</div>`).join("");
}

</script>

</body>
</html>
