<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>노마</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root{
      --bg:#000000;
      --panel:#111111;
      --panel-2:#181818;
      --line:#2a2a2a;
      --gold:#D4AF37;
      --text:#ffffff;
      --muted:#a0a0a0;
      --danger:#ff4d4f;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:16px;
    }

    .brand{
      font-size:28px;
      font-weight:800;
      color:var(--gold);
      margin:0 0 12px;
      letter-spacing:1px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-bottom:12px;
    }

    .search-row,
    .filter-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .input,
    .select{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--gold);
      border-radius:10px;
      padding:12px;
      min-height:44px;
      outline:none;
    }

    .input{
      flex:1;
      min-width:220px;
    }

    .btn{
      border:none;
      border-radius:10px;
      background:var(--gold);
      color:#000;
      font-weight:700;
      padding:10px 14px;
      cursor:pointer;
      min-height:44px;
    }

    .btn.secondary{
      background:var(--panel);
      color:var(--gold);
      border:1px solid var(--gold);
    }

    .status-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:10px 0 14px;
      color:var(--muted);
      font-size:14px;
      flex-wrap:wrap;
    }

    #map{
      width:100%;
      height:320px;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
      margin-bottom:14px;
    }

    #loading{
      display:none;
      text-align:center;
      padding:18px;
      color:var(--gold);
      font-weight:700;
    }

    #list{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:14px;
      margin-bottom:80px;
    }

    .card{
      position:relative;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      transition:transform .15s ease, border-color .15s ease, background .15s ease;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:var(--gold);
    }

    .card.active{
      border:2px solid var(--gold);
      background:#1a1a1a;
    }

    .card-title{
      font-size:18px;
      font-weight:800;
      color:var(--gold);
      margin-bottom:8px;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      margin-bottom:6px;
    }

    .price{
      font-size:17px;
      font-weight:800;
      margin:10px 0;
    }

    .score-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      font-size:13px;
      color:#ddd;
      margin-bottom:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:4px;
      border:1px solid #333;
      background:var(--panel-2);
      color:var(--gold);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
    }

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .empty{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:24px;
      text-align:center;
      color:var(--muted);
      grid-column:1 / -1;
    }

    .floating-left,
    .floating-right{
      position:fixed;
      bottom:20px;
      z-index:1000;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .floating-left{ left:16px; }
    .floating-right{ right:16px; }

    .floating-btn{
      min-width:56px;
      min-height:44px;
      border:none;
      border-radius:12px;
      background:var(--gold);
      color:#000;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 6px 20px rgba(0,0,0,.35);
    }

    .recent-box{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:14px;
    }

    .recent-box button{
      background:var(--panel);
      color:var(--gold);
      border:1px solid #333;
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      z-index:2000;
      padding:20px;
    }

    .modal.open{
      display:block;
    }

    .modal-body{
      max-width:560px;
      margin:60px auto 0;
      background:var(--panel);
      border:1px solid var(--gold);
      border-radius:16px;
      padding:20px;
    }

    .modal-title{
      color:var(--gold);
      font-size:24px;
      margin:0 0 12px;
    }

    .modal-content{
      color:#eee;
      line-height:1.55;
      margin-bottom:16px;
    }

    .network-online{ color:#57d957; }
    .network-offline{ color:var(--danger); }

    @media (max-width:768px){
      .brand{ font-size:24px; }
      #map{ height:260px; }
      .card-title{ font-size:16px; }
      .price{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="brand">노마</h1>

    <div class="topbar">
      <div class="search-row">
        <input id="search" class="input" placeholder="업체명, 지역 검색" />
        <button id="reloadBtn" class="btn">새로고침</button>
      </div>

      <div id="recentSearchBox" class="recent-box"></div>

      <div class="filter-row">
        <button class="btn secondary" data-sort="like">인기순</button>
        <button class="btn secondary" data-sort="rating">평점순</button>
        <button class="btn secondary" data-sort="distance">거리순</button>
        <button class="btn secondary" data-sort="view">조회순</button>

        <button class="btn secondary" data-price="low">저가</button>
        <button class="btn secondary" data-price="high">고가</button>
        <button class="btn secondary" data-price="">전체</button>
      </div>

      <div class="status-row">
        <div id="resultCount">0개 결과</div>
        <div id="networkStatus" class="network-online">🟢 ONLINE</div>
      </div>
    </div>

    <div id="map"></div>
    <div id="loading">🔥 로딩중...</div>
    <div id="list"></div>
  </div>

  <div class="floating-left">
    <button class="floating-btn" id="debugBtn">DEBUG</button>
    <button class="floating-btn" id="resetBtn">RESET</button>
  </div>

  <div class="floating-right">
    <button class="floating-btn" id="topBtn">↑</button>
  </div>

  <div id="modal" class="modal">
    <div class="modal-body">
      <h2 id="modalTitle" class="modal-title"></h2>
      <div id="modalContent" class="modal-content"></div>
      <button id="closeModalBtn" class="btn">닫기</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    (function () {
      "use strict";

      /* =========================
         CONFIG
      ========================= */
      const API_BASE_URL = "";
      const socket = window.io ? io() : null;

      /* =========================
         STATE
      ========================= */
      const state = {
        token: localStorage.getItem("token") || "",
        shops: [],
        page: 1,
        loading: false,
        hasMore: true,
        favorites: new Set(JSON.parse(localStorage.getItem("favorites") || "[]")),
        selectedId: localStorage.getItem("selectedShop") || null,
        currentFilter: { region: null, price: null },
        currentSort: "like",
        cache: [],
        lastKeyword: "",
        lastLoadTime: 0,
        errorCount: 0,
        currentItems: [],
        mergedItems: [],
        activeRequestKey: null,
        clickLock: false
      };

      /* =========================
         DOM
      ========================= */
      const $ = (id) => document.getElementById(id);
      const listEl = $("list");
      const loadingEl = $("loading");
      const searchInput = $("search");
      const resultCountEl = $("resultCount");
      const networkStatusEl = $("networkStatus");
      const recentSearchBox = $("recentSearchBox");
      const modalEl = $("modal");
      const modalTitleEl = $("modalTitle");
      const modalContentEl = $("modalContent");
      const reloadBtn = $("reloadBtn");
      const topBtn = $("topBtn");
      const debugBtn = $("debugBtn");
      const resetBtn = $("resetBtn");
      const closeModalBtn = $("closeModalBtn");

      /* =========================
         MAP
      ========================= */
      let map = null;
      let markers = [];

      if ($("map") && window.L) {
        map = L.map("map").setView([35.2283, 128.8892], 13);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19
        }).addTo(map);
      }

      /* =========================
         HELPERS
      ========================= */
      function safeNum(v, d = 0) {
        const n = Number(v);
        return Number.isFinite(n) ? n : d;
      }

      function safeArr(v) {
        return Array.isArray(v) ? v : [];
      }

      function escapeHtml(v) {
        return String(v ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getPrice(p) {
        return safeNum(p?.priceDiscount || p?.price || 0);
      }

      function calcScore(s) {
        return (
          safeNum(s.likeCount) * 3 +
          safeNum(s.ratingAvg) * 10 +
          safeNum(s.reviewCount) * 2 +
          safeNum(s.viewCount)
        );
      }

      function normalizeShop(s) {
        return {
          ...s,
          _id: String(s?._id || ""),
          name: s?.name || "",
          region: s?.region || "",
          ratingAvg: safeNum(s?.ratingAvg),
          likeCount: safeNum(s?.likeCount),
          reviewCount: safeNum(s?.reviewCount),
          viewCount: safeNum(s?.viewCount),
          price: safeNum(s?.price),
          priceDiscount: safeNum(s?.priceDiscount),
          distanceKm: safeNum(s?.distanceKm),
          tags: safeArr(s?.tags),
          lat: safeNum(s?.lat, null),
          lng: safeNum(s?.lng, null),
          score: calcScore(s || {})
        };
      }

      function uniqueById(arr) {
        const map = new Map();
        safeArr(arr).forEach((v) => {
          if (v && v._id) map.set(v._id, normalizeShop(v));
        });
        return [...map.values()];
      }

      function saveCache(items) {
        state.cache = safeArr(items);
        try {
          localStorage.setItem("noma_cache", JSON.stringify(state.cache.slice(0, 200)));
        } catch {}
      }

      function loadCache() {
        try {
          return JSON.parse(localStorage.getItem("noma_cache") || "[]");
        } catch {
          return [];
        }
      }

      function saveRecentSearch(keyword) {
        if (!keyword) return;
        let arr = [];
        try {
          arr = JSON.parse(localStorage.getItem("recentSearch") || "[]");
        } catch {}
        arr.unshift(keyword);
        arr = [...new Set(arr)].slice(0, 10);
        localStorage.setItem("recentSearch", JSON.stringify(arr));
      }

      function getRecentSearch() {
        try {
          return JSON.parse(localStorage.getItem("recentSearch") || "[]");
        } catch {
          return [];
        }
      }

      function renderRecentSearch() {
        if (!recentSearchBox) return;
        const arr = getRecentSearch();
        recentSearchBox.innerHTML = arr
          .map((k) => `<button type="button" data-recent="${escapeHtml(k)}">${escapeHtml(k)}</button>`)
          .join("");
      }

      function saveRecentViewed(shop) {
        let arr = [];
        try {
          arr = JSON.parse(localStorage.getItem("recentViewed") || "[]");
        } catch {}
        arr.unshift(shop);
        arr = arr.filter((v, i, self) => v && self.findIndex(x => x._id === v._id) === i).slice(0, 10);
        localStorage.setItem("recentViewed", JSON.stringify(arr));
      }

      function saveSelected(id) {
        state.selectedId = id;
        localStorage.setItem("selectedShop", id);
      }

      function restoreSelected() {
        state.selectedId = localStorage.getItem("selectedShop") || null;
      }

      function saveKeyword(keyword) {
        state.lastKeyword = keyword || "";
        localStorage.setItem("lastKeyword", state.lastKeyword);
      }

      function restoreKeyword() {
        state.lastKeyword = localStorage.getItem("lastKeyword") || "";
        if (searchInput) searchInput.value = state.lastKeyword;
      }

      function formatKm(km) {
        km = safeNum(km);
        return km < 1 ? `${Math.round(km * 1000)}m` : `${km.toFixed(2)}km`;
      }

      function showError(msg) {
        if (!listEl) return;
        listEl.innerHTML = `<div class="empty" style="color:#ff6b6b;">${escapeHtml(msg)}</div>`;
      }

      function showLoading(on) {
        state.loading = !!on;
        if (loadingEl) loadingEl.style.display = on ? "block" : "none";
      }

      function updateNetworkUI() {
        if (!networkStatusEl) return;
        const online = navigator.onLine;
        networkStatusEl.textContent = online ? "🟢 ONLINE" : "🔴 OFFLINE";
        networkStatusEl.className = online ? "network-online" : "network-offline";
      }

      function showResultCount(n) {
        if (!resultCountEl) return;
        resultCountEl.textContent = `${safeNum(n)}개 결과`;
      }

      function canLoad() {
        const now = Date.now();
        if (now - state.lastLoadTime < 250) return false;
        state.lastLoadTime = now;
        return true;
      }

      function setActiveRequest(key) {
        if (state.activeRequestKey === key) return false;
        state.activeRequestKey = key;
        return true;
      }

      function clearActiveRequest() {
        state.activeRequestKey = null;
      }

      function scrollTopSmooth() {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function closeModal() {
        modalEl?.classList.remove("open");
      }

      function openModal(title, html) {
        if (!modalEl || !modalTitleEl || !modalContentEl) return;
        modalTitleEl.textContent = title || "";
        modalContentEl.innerHTML = html || "";
        modalEl.classList.add("open");
      }

      function applyFilter(items) {
        return safeArr(items).filter((p) => {
          if (state.currentFilter.region && p.region !== state.currentFilter.region) return false;
          if (state.currentFilter.price === "low" && getPrice(p) > 50000) return false;
          if (state.currentFilter.price === "high" && getPrice(p) < 50000) return false;
          return true;
        });
      }

      function applyKeyword(items) {
        const keyword = String(searchInput?.value || "").trim().toLowerCase();
        if (!keyword) return items;
        return safeArr(items).filter((v) =>
          String(v.name || "").toLowerCase().includes(keyword) ||
          String(v.region || "").toLowerCase().includes(keyword)
        );
      }

      function applySort(items) {
        const copy = [...safeArr(items)];
        switch (state.currentSort) {
          case "distance":
            return copy.sort((a, b) => safeNum(a.distanceKm, 999) - safeNum(b.distanceKm, 999));
          case "rating":
            return copy.sort((a, b) => safeNum(b.ratingAvg) - safeNum(a.ratingAvg));
          case "view":
            return copy.sort((a, b) => safeNum(b.viewCount) - safeNum(a.viewCount));
          default:
            return copy.sort((a, b) => safeNum(b.likeCount) - safeNum(a.likeCount));
        }
      }

      /* =========================
         API
      ========================= */
      async function api(path, opt = {}) {
        try {
          const res = await fetch(API_BASE_URL + path, {
            ...opt,
            headers: {
              "Content-Type": "application/json",
              ...(state.token ? { Authorization: `Bearer ${state.token}` } : {}),
              ...(opt.headers || {})
            }
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            state.errorCount++;
            console.error("API ERROR:", path, data);
            return { ok: false, items: [] };
          }

          return data;
        } catch (e) {
          state.errorCount++;
          console.error("API FAIL:", path, e);
          return { ok: false, items: [] };
        }
      }

      /* =========================
         RENDER
      ========================= */
      function render(items) {
        if (!listEl) return;

        let finalItems = uniqueById(items);
        finalItems = applyKeyword(finalItems);
        finalItems = applyFilter(finalItems);
        finalItems = applySort(finalItems);
        finalItems = finalItems.slice(0, 150);

        state.currentItems = finalItems;
        showResultCount(finalItems.length);
        saveCache(state.shops);

        listEl.innerHTML = "";

        if (map && markers.length) {
          markers.forEach((m) => {
            try { map.removeLayer(m); } catch {}
          });
          markers = [];
        }

        if (!finalItems.length) {
          listEl.innerHTML = `<div class="empty">결과 없음</div>`;
          return;
        }

        finalItems.forEach((shop) => {
          const card = document.createElement("div");
          card.className = "card" + (state.selectedId === shop._id ? " active" : "");

          card.innerHTML = `
            <div class="card-title">${escapeHtml(shop.name)}</div>
            <div class="meta">📍 ${escapeHtml(shop.region || "-")}</div>
            <div class="meta">📏 ${escapeHtml(formatKm(shop.distanceKm))}</div>
            <div class="price">${getPrice(shop).toLocaleString()}원</div>
            <div class="score-row">
              <span class="chip">⭐ ${shop.ratingAvg}</span>
              <span class="chip">❤️ ${shop.likeCount}</span>
              <span class="chip">👁 ${shop.viewCount}</span>
            </div>
            <div class="action-row">
              <button class="btn secondary like-btn" type="button">
                ${state.favorites.has(shop._id) ? "★ 찜됨" : "☆ 찜"}
              </button>
              <button class="btn reserve-btn" type="button">예약</button>
              <button class="btn secondary detail-btn" type="button">상세</button>
            </div>
          `;

          card.onclick = () => {
            saveSelected(shop._id);
            saveRecentViewed(shop);
            selectItem(shop);
            render(state.shops);
          };

          card.querySelector(".like-btn").onclick = async (e) => {
            e.stopPropagation();
            await toggleFavorite(shop._id);
          };

          card.querySelector(".reserve-btn").onclick = async (e) => {
            e.stopPropagation();
            await reserveShop(shop._id);
          };

          card.querySelector(".detail-btn").onclick = async (e) => {
            e.stopPropagation();
            await openDetail(shop._id);
          };

          listEl.appendChild(card);

          if (map && shop.lat && shop.lng) {
            const marker = L.marker([shop.lat, shop.lng]).addTo(map);
            marker.on("click", () => {
              saveSelected(shop._id);
              selectItem(shop);
              render(state.shops);
            });
            markers.push(marker);
          }
        });
      }

      /* =========================
         LOAD
      ========================= */
      let loadLock = false;

      async function loadPlaces(reset = false) {
        const requestKey = `${state.page}_${searchInput?.value || ""}_${JSON.stringify(state.currentFilter)}_${state.currentSort}`;

        if (!setActiveRequest(requestKey) && !reset) return;
        if (!canLoad()) {
          clearActiveRequest();
          return;
        }
        if (loadLock) {
          clearActiveRequest();
          return;
        }

        loadLock = true;
        showLoading(true);

        try {
          if (reset) {
            state.page = 1;
            state.hasMore = true;
            state.mergedItems = [];
            state.shops = [];
          }

          if (!state.hasMore) return;

          let url = `/api/shops?page=${state.page}`;
          const keyword = String(searchInput?.value || "").trim();

          if (keyword) {
            saveKeyword(keyword);
            saveRecentSearch(keyword);
            url += `&keyword=${encodeURIComponent(keyword)}`;
          }

          const data = await api(url);
          const items = safeArr(data.items).map(normalizeShop);

          if (!data || !Array.isArray(data.items)) {
            showError("데이터 불러오기 실패");
            return;
          }

          if (items.length === 0) {
            state.hasMore = false;
            if (!state.shops.length) render([]);
            return;
          }

          state.shops = uniqueById([...state.shops, ...items]);
          state.page += 1;
          render(state.shops);
        } finally {
          loadLock = false;
          showLoading(false);
          clearActiveRequest();
        }
      }

      /* =========================
         ACTIONS
      ========================= */
      const favoriteLock = new Set();

      async function toggleFavorite(id) {
        if (!id || favoriteLock.has(id)) return;
        favoriteLock.add(id);

        try {
          if (state.favorites.has(id)) state.favorites.delete(id);
          else state.favorites.add(id);

          localStorage.setItem("favorites", JSON.stringify([...state.favorites]));
          render(state.shops);

          await api(`/api/favorites/${id}`, { method: "POST" });
        } finally {
          setTimeout(() => favoriteLock.delete(id), 200);
        }
      }

      let lastReserveAt = 0;

      async function reserveShop(id) {
        if (!id) return;
        if (Date.now() - lastReserveAt < 800) return;
        lastReserveAt = Date.now();

        if (!state.token) {
          alert("로그인 필요");
          return;
        }

        const reserveAt = prompt("예약시간을 입력하세요");
        if (!reserveAt) return;

        await api("/api/reservations", {
          method: "POST",
          body: JSON.stringify({
            shopId: id,
            reserveAt: new Date(reserveAt)
          })
        });

        alert("예약 완료");
      }

      async function selectItem(shop) {
        if (!shop?._id) return;
        state.selectedId = shop._id;

        try {
          await api(`/api/shops/${shop._id}/click`, { method: "POST" });
        } catch {}

        if (map && shop.lat && shop.lng) {
          map.setView([shop.lat, shop.lng], 15);
        }
      }

      async function openDetail(id) {
        const data = await api(`/api/shops/${id}`);
        if (!data.shop) return;

        openModal(
          data.shop.name || "",
          `
            <div style="margin-bottom:10px;">⭐ ${safeNum(data.shop.ratingAvg)}</div>
            <div style="margin-bottom:10px;">📍 ${escapeHtml(data.shop.region || "-")}</div>
            <div style="margin-bottom:16px;">${escapeHtml(data.shop.description || "")}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn" onclick="window.__nomaLike('${id}')">찜</button>
              <button class="btn secondary" onclick="window.__nomaReserve('${id}')">예약</button>
            </div>
          `
        );
      }

      window.__nomaLike = toggleFavorite;
      window.__nomaReserve = reserveShop;

      function hardReset() {
        state.page = 1;
        state.hasMore = true;
        state.shops = [];
        state.cache = [];
        state.errorCount = 0;
        state.lastLoadTime = 0;
        loadPlaces(true);
      }

      function debug() {
        console.log({
          state,
          recentSearch: getRecentSearch(),
          cacheSize: state.cache.length,
          currentItems: state.currentItems.length
        });
      }

      /* =========================
         EVENTS
      ========================= */
      let debounceTimer = null;

      searchInput?.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          state.page = 1;
          state.hasMore = true;
          state.shops = [];
          loadPlaces(true);
          renderRecentSearch();
        }, 300);
      });

      let scrollTick = false;
      window.addEventListener("scroll", () => {
        if (scrollTick) return;
        scrollTick = true;

        requestAnimationFrame(() => {
          if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 150) {
            loadPlaces(false);
          }
          scrollTick = false;
        });
      });

      window.addEventListener("offline", () => {
        updateNetworkUI();
        const cached = loadCache();
        if (cached.length) {
          state.shops = uniqueById(cached);
          render(state.shops);
        }
      });

      window.addEventListener("online", () => {
        updateNetworkUI();
        loadPlaces(true);
      });

      window.addEventListener("storage", (e) => {
        if (e.key === "favorites") {
          state.favorites = new Set(JSON.parse(e.newValue || "[]"));
          render(state.shops);
        }
      });

      document.addEventListener("click", (e) => {
        const recent = e.target.closest("[data-recent]");
        if (recent && searchInput) {
          searchInput.value = recent.dataset.recent || "";
          loadPlaces(true);
        }
      });

      document.querySelectorAll("[data-sort]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.currentSort = btn.dataset.sort || "like";
          render(state.shops);
        });
      });

      document.querySelectorAll("[data-price]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.currentFilter.price = btn.dataset.price || null;
          render(state.shops);
        });
      });

      reloadBtn?.addEventListener("click", () => loadPlaces(true));
      topBtn?.addEventListener("click", scrollTopSmooth);
      debugBtn?.addEventListener("click", debug);
      resetBtn?.addEventListener("click", hardReset);
      closeModalBtn?.addEventListener("click", closeModal);
      modalEl?.addEventListener("click", (e) => {
        if (e.target === modalEl) closeModal();
      });

      if (socket) {
        socket.on("shop:like", () => loadPlaces(true));
        socket.on("shop:review", () => loadPlaces(true));
      }

      function attachMapDebounce() {
        if (!map) return;
        let t;
        map.on("moveend", () => {
          clearTimeout(t);
          t = setTimeout(() => {
            state.page = 1;
            state.hasMore = true;
            state.shops = [];
            loadPlaces(true);
          }, 300);
        });
      }

      /* =========================
         INIT
      ========================= */
      function init() {
        restoreSelected();
        restoreKeyword();
        updateNetworkUI();
        renderRecentSearch();
        attachMapDebounce();

        const cached = loadCache();
        if (cached.length) {
          state.shops = uniqueById(cached);
          render(state.shops);
        }

        loadPlaces(true);

        setInterval(() => {
          if (!document.hidden) {
            loadPlaces(false);
          }
        }, 120000);

        setInterval(() => {
          if (state.shops.length > 250) {
            state.shops = state.shops.slice(0, 180);
          }
        }, 15000);
      }

      init();

      window.NOMA = {
        state,
        reload: () => loadPlaces(true),
        reset: hardReset,
        debug
      };

      console.log("🔥 NOMA FINAL READY");
    })();
  </script>
</body>
</html>
