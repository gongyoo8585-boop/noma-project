<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>맛집 PRO</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}
header{
  padding:15px;
  background:#000;
}
input{
  padding:8px;
  margin:5px;
}
button{
  padding:8px 12px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<input id="id" placeholder="아이디">
<input id="pw" type="password" placeholder="비밀번호">

<button onclick="register()">회원가입</button>
<button onclick="login()">로그인</button>
<button onclick="kakaoLogin()">카카오 로그인</button>
</header>

<script>

let token = "";

/* ===== 회원가입 ===== */
async function register(){
  const res = await fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:id.value,
      password:pw.value
    })
  });

  const data = await res.json();
  alert(data.message);
}

/* ===== 로그인 ===== */
async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:id.value,
      password:pw.value
    })
  });

  const data = await res.json();

  if(data.error){
    alert("로그인 실패");
    return;
  }

  token = data.token;
  alert("로그인 성공");
}

/* ===== 카카오 ===== */
function kakaoLogin(){
  window.location.href = "/kakao";
}

</script>

</body>
</html>
