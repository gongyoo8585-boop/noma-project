<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이벤트 / 게시판</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
}

/* =========================
   🔥 HEADER
========================= */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 40px;
  border-bottom:1px solid #eee;
}

.logo {
  font-size:32px;
  font-weight:900;
  color:red;
  cursor:pointer;
}

.menu {
  display:flex;
  gap:25px;
  align-items:center;
}

.menu-item {
  position: relative;
  cursor: pointer;
  font-weight:700;
}

/* =========================
   🔥 DROPDOWN
========================= */
.dropdown {
  position: absolute;
  top: 40px;
  right: 0;
  width: 200px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.12);
  display: none;
  padding: 10px 0;
  z-index: 999;
  animation: fadeIn 0.25s ease;
}

.dropdown div {
  padding: 12px 16px;
  cursor: pointer;
  transition:0.2s;
}

.dropdown div:hover {
  background:#f5f5f5;
  color:red;
}

/* =========================
   🔥 UI 확장
========================= */
.menu div.active {
  color:red;
}

.header.sticky {
  position:fixed;
  top:0;
  width:100%;
  background:white;
  z-index:1000;
}

.search-box {
  position:relative;
}

.search-input {
  padding:8px;
  width:200px;
}

.recent-box {
  position:absolute;
  top:35px;
  background:white;
  border:1px solid #ddd;
  width:200px;
  display:none;
}

.recent-item {
  padding:8px;
  cursor:pointer;
}
.recent-item:hover {
  background:#eee;
}

/* 🔥 로딩 바 */
.loading-bar{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  background:red;
  width:0%;
  transition:0.3s;
}

/* =========================
   🔥 EVENT CARD
========================= */
.container {
  padding:40px;
}

.card {
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card img {
  width:400px;
  border-radius:12px;
  transition:0.2s;
}

.card img:hover{
  transform:scale(1.05);
}

/* ========================= */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px)}
  to {opacity:1;}
}
</style>

</head>

<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="header">

  <div class="logo">마짱</div>

  <div class="search-box">
    <input id="searchInput" class="search-input" placeholder="검색">
    <div id="recentBox" class="recent-box"></div>
  </div>

  <div class="menu">
    <div onclick="go('/search')">상세검색</div>
    <div onclick="go('/inquiry.html')">제휴문의</div>
    <div onclick="go('/event-board.html')">이벤트</div>

    <div class="menu-item" id="boardMenu">
      게시판

      <div class="dropdown" id="boardDropdown">
        <div onclick="go('/board/recommend')">샵추천</div>
        <div onclick="go('/board/region')">지역별 샵추천</div>
        <div onclick="go('/board/review')">방문후기</div>
        <div onclick="go('/board/share')">정보공유</div>
        <div onclick="go('/board/community')">커뮤니티</div>
        <div onclick="go('/board/notice')">공지사항</div>
      </div>
    </div>

  </div>
</div>

<div class="container">
  <h2>이벤트</h2>

  <div class="card">
    <img src="https://dummyimage.com/600x300/f0c/fff&text=룰렛이벤트">
    <img src="https://dummyimage.com/600x300/0cf/fff&text=출석이벤트">
  </div>
</div>

<script>

/* =========================
   🔥 CORE
========================= */
function go(url){
  showLoadingBar();
  location.href = url;
}

const boardMenu = document.getElementById("boardMenu");
const boardDropdown = document.getElementById("boardDropdown");

/* =========================
   🔥 DROPDOWN
========================= */
boardMenu.addEventListener("mouseenter", () => {
  if(window.innerWidth > 768){
    boardDropdown.style.display = "block";
  }
});

boardMenu.addEventListener("mouseleave", () => {
  if(window.innerWidth > 768){
    boardDropdown.style.display = "none";
  }
});

boardMenu.addEventListener("click", (e) => {
  e.stopPropagation();
  boardDropdown.style.display =
    boardDropdown.style.display === "block" ? "none" : "block";
});

document.addEventListener("click", () => {
  boardDropdown.style.display = "none";
});

/* =========================
   🔥 SEARCH
========================= */
const searchInput = document.getElementById("searchInput");
const recentBox = document.getElementById("recentBox");

/* Enter 검색 */
searchInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    saveSearch(searchInput.value);
    go(`/search?keyword=${encodeURIComponent(searchInput.value)}`);
  }
});

/* 저장 */
function saveSearch(q){
  if(!q) return;
  let arr = JSON.parse(localStorage.getItem("recentSearch")||"[]");
  arr.unshift(q);
  arr=[...new Set(arr)].slice(0,5);
  localStorage.setItem("recentSearch",JSON.stringify(arr));
}

/* 표시 */
searchInput.addEventListener("focus",()=>{
  const arr = JSON.parse(localStorage.getItem("recentSearch")||"[]");

  recentBox.innerHTML = arr.map(v=>`
    <div class="recent-item">${v}</div>
  `).join("");

  recentBox.style.display="block";

  recentBox.querySelectorAll(".recent-item").forEach(el=>{
    el.onclick=()=>{
      go(`/search?keyword=${encodeURIComponent(el.innerText)}`);
    };
  });
});

/* blur */
searchInput.addEventListener("blur",()=>{
  setTimeout(()=>recentBox.style.display="none",200);
});

/* =========================
   🔥 UI 기능
========================= */

/* sticky */
window.addEventListener("scroll",()=>{
  const h = document.querySelector(".header");
  h.classList.toggle("sticky", window.scrollY > 50);
});

/* 로딩바 */
function showLoadingBar(){
  const bar = document.getElementById("loadingBar");
  bar.style.width="100%";
  setTimeout(()=>bar.style.width="0%",500);
}

/* 메뉴 클릭 효과 */
document.addEventListener("click",(e)=>{
  const el = e.target.closest(".menu div");
  if(el){
    el.style.transform="scale(0.95)";
    setTimeout(()=>el.style.transform="",100);
  }
});

/* ESC */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape"){
    boardDropdown.style.display="none";
    recentBox.style.display="none";
  }
});

/* =========================
   🔥 추가 기능 10개
========================= */

// 1 검색 길이 제한
searchInput.addEventListener("input",()=>{
  if(searchInput.value.length>20){
    searchInput.value=searchInput.value.slice(0,20);
  }
});

// 2 방문 카운트
let visit = Number(localStorage.getItem("visit")||0)+1;
localStorage.setItem("visit",visit);

// 3 방문 로그
console.log("방문횟수:",visit);

// 4 페이지 시간
console.log("접속:",new Date().toLocaleTimeString());

// 5 자동 포커스
window.addEventListener("load",()=>searchInput.focus());

// 6 최근검색 삭제
function clearRecent(){
  localStorage.removeItem("recentSearch");
}

// 7 메뉴 로그
document.querySelectorAll(".menu div").forEach(el=>{
  el.addEventListener("click",()=>console.log("CLICK:",el.innerText));
});

// 8 모바일 닫기
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".menu-item")){
    boardDropdown.style.display="none";
  }
});

// 9 디버그
function debugAll(){
  console.log({
    recent:localStorage.getItem("recentSearch"),
    visit
  });
}

// 10 네트워크 감지
window.addEventListener("offline",()=>alert("오프라인"));
window.addEventListener("online",()=>alert("온라인"));

</script>

</body>
</html>
