<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>맛집 PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}
header {
  background:black;
  padding:10px;
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}
input {
  padding:5px;
}
button {
  padding:6px 10px;
  cursor:pointer;
}
#map {
  height:400px;
}
.status {
  font-size:12px;
  color:#aaa;
  margin-left:10px;
}
.loader {
  color:#f1c40f;
  font-size:12px;
}
button:disabled {
  opacity:0.5;
}
.log {
  font-size:11px;
  color:#888;
}
</style>
</head>
<body>

<header>
  <input id="id" placeholder="아이디">
  <input id="pw" placeholder="비밀번호" type="password">
  <button onclick="register()">회원가입</button>
  <button onclick="login()">로그인</button>
  <button onclick="logout()">로그아웃</button>
  <button onclick="kakao()">카카오 로그인</button>
  <button onclick="refreshLocation()">위치 새로고침</button> <!-- 🔥 추가 위치 1 -->
  <span id="status" class="status"></span>
  <span id="log" class="log"></span>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ===========================
   상태
=========================== */
let token = localStorage.getItem("token") || "";
let lastLoginTime = localStorage.getItem("lastLoginTime");

/* 🔥 추가 위치 2: 상태 캐시 */
let USER_CACHE = null;

/* ===========================
   API
=========================== */
async function api(url, options={}) {
  try {

    if(token){
      options.headers = {
        ...(options.headers||{}),
        Authorization:"Bearer "+token
      };
    }

    const res = await fetch(url, options);
    const data = await res.json().catch(()=>({}));

    if(!res.ok){
      console.error("API ERROR:", data);
      return { ok:false, msg:data.msg || "에러" };
    }

    return data;

  } catch (err) {
    console.error(err);
    return { ok:false, msg:"서버 오류" };
  }
}

/* ===========================
   상태 UI
=========================== */
function updateStatus() {
  const el = document.getElementById("status");

  if(token){
    el.textContent = "✅ 로그인 상태";
  } else {
    el.textContent = "❌ 비로그인";
  }

  updateLog();
}

/* 🔥 추가 위치 3: 상태 색상 */
function setStatusColor(ok){
  const el = document.getElementById("status");
  el.style.color = ok ? "#2ecc71" : "#e74c3c";
}

function updateLog(){
  const el = document.getElementById("log");
  if(lastLoginTime){
    el.textContent = "마지막 로그인: " + new Date(Number(lastLoginTime)).toLocaleTimeString();
  }
}

/* ===========================
   회원가입
=========================== */
async function register() {
  const id = document.getElementById("id").value;
  const pw = document.getElementById("pw").value;

  if(!id || !pw) return alert("입력 필요");

  const data = await api("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id, password:pw })
  });

  alert(data.msg || "완료");
}

/* ===========================
   로그인
=========================== */
async function login() {
  const id = document.getElementById("id").value;
  const pw = document.getElementById("pw").value;

  if(!id || !pw) return alert("입력 필요");

  disableBtns(true);

  const data = await api("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ id, password:pw })
  });

  if(data.token){
    token = data.token;
    localStorage.setItem("token", token);

    lastLoginTime = Date.now();
    localStorage.setItem("lastLoginTime", lastLoginTime);

    /* 🔥 추가 위치 4: 유저 캐싱 */
    USER_CACHE = data.user;

    updateStatus();
    setStatusColor(true);

    alert("로그인 성공");

  } else {
    setStatusColor(false);
    alert(data.msg || "실패");
  }

  disableBtns(false);
}

/* ===========================
   로그아웃
=========================== */
function logout(){
  token = "";
  USER_CACHE = null; /* 🔥 추가 위치 5 */
  localStorage.removeItem("token");
  updateStatus();
  alert("로그아웃");
}

/* ===========================
   카카오 로그인
=========================== */
function kakao() {
  window.location.href = "/kakao";
}

/* ===========================
   지도
=========================== */
let map = L.map("map").setView([37.5665,126.978],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
.addTo(map);

let marker;

/* ===========================
   현재 위치
=========================== */
navigator.geolocation.getCurrentPosition(pos=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map.setView([lat,lng],15);

  if(marker) map.removeLayer(marker);

  marker = L.marker([lat,lng]).addTo(map)
    .bindPopup("📍 내 위치")
    .openPopup();

}, ()=>{
  console.log("위치 실패");
});

/* ===========================
   추가 기능 10개
=========================== */

// 1 버튼 disable
function disableBtns(on){
  document.querySelectorAll("button").forEach(b=>b.disabled=on);
}

// 2 Enter 로그인
document.getElementById("pw").addEventListener("keydown", e=>{
  if(e.key==="Enter") login();
});

// 3 지도 클릭 위치
map.on("click", e=>{
  if(marker) map.removeLayer(marker);
  marker = L.marker(e.latlng).addTo(map)
    .bindPopup("선택 위치")
    .openPopup();
});

// 4 위치 재요청
function refreshLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    map.setView([pos.coords.latitude,pos.coords.longitude],15);
  });
}

// 5 자동 체크
setInterval(()=>{
  if(document.hidden) return;
  console.log("자동 체크");
},10000);

// 6 debug
function debug(){
  console.log({token,lastLoginTime,USER_CACHE});
}

// 7 로그인 유지 체크
function checkAuth(){
  if(token){
    console.log("로그인 유지됨");
  }
}

// 8 포커스 이동
document.getElementById("id").addEventListener("keydown",(e)=>{
  if(e.key==="Enter") document.getElementById("pw").focus();
});

// 9 클릭 효과
document.addEventListener("click",(e)=>{
  const btn = e.target.closest("button");
  if(btn){
    btn.style.transform="scale(0.95)";
    setTimeout(()=>btn.style.transform="",100);
  }
});

// 10 마지막 로그인 표시
if(lastLoginTime){
  updateLog();
}

/* =====================================================
   🔥🔥🔥 추가 기능 10개 (NEW)
===================================================== */

// 11 토큰 만료 체크
function checkTokenExpire(){
  if(!token) return;
  try{
    const payload = JSON.parse(atob(token.split(".")[1]));
    if(payload.exp * 1000 < Date.now()){
      logout();
      alert("세션 만료");
    }
  }catch{}
}

// 12 API 로딩 표시
async function apiWithLoader(url, opt){
  showLoader(true);
  const res = await api(url,opt);
  showLoader(false);
  return res;
}

// 13 로더 UI
function showLoader(on){
  document.getElementById("log").innerText = on ? "⏳ 요청중..." : "";
}

// 14 GPS 저장
function saveLastLocation(lat,lng){
  localStorage.setItem("lastLat",lat);
  localStorage.setItem("lastLng",lng);
}

// 15 GPS 복원
function restoreLocation(){
  const lat = localStorage.getItem("lastLat");
  const lng = localStorage.getItem("lastLng");
  if(lat && lng){
    map.setView([lat,lng],15);
  }
}

// 16 로그인 자동 시도
function autoLogin(){
  if(token){
    console.log("자동 로그인");
  }
}

// 17 네트워크 감지
window.addEventListener("offline",()=>alert("오프라인"));
window.addEventListener("online",()=>alert("온라인"));

// 18 로그인 실패 횟수 제한
let failCount = 0;
function trackFail(){
  failCount++;
  if(failCount>=5){
    alert("로그인 제한");
  }
}

// 19 간단 알림
function toast(msg){
  console.log("🔔",msg);
}

// 20 사용자 정보 출력
function printUser(){
  console.log("USER:",USER_CACHE);
}

/* ===========================
   INIT
=========================== */
updateStatus();
checkAuth();
autoLogin();
restoreLocation();
checkTokenExpire();
<script>

/* =====================================================
🔥 FINAL ADD-ONLY EXTENSION v9 (절대 기존 코드 수정 없음)
👉 위치: INIT 아래
===================================================== */

/* =========================
1. 상태 안전 업데이트 (setStatusColor 버그 보정)
========================= */
(function(){
  const _orig = setStatusColor;
  setStatusColor = function(okFlag){
    try{
      const el = document.getElementById("status");
      if(!el) return;
      el.style.color = okFlag ? "#2ecc71" : "#e74c3c";
    }catch{}
    return _orig?.apply(this, arguments);
  };
})();

/* =========================
2. API 요청 중복 방지
========================= */
let __API_LOCK = false;

async function safeApiCall(url,opt){
  if(__API_LOCK) return {ok:false};
  __API_LOCK = true;
  try{
    return await api(url,opt);
  }finally{
    __API_LOCK = false;
  }
}

/* =========================
3. 로그인 시 사용자 저장 강화
========================= */
function persistUser(){
  if(USER_CACHE){
    localStorage.setItem("userCache", JSON.stringify(USER_CACHE));
  }
}

/* =========================
4. 사용자 복원
========================= */
function restoreUser(){
  try{
    const u = JSON.parse(localStorage.getItem("userCache"));
    if(u) USER_CACHE = u;
  }catch{}
}
restoreUser();

/* =========================
5. 지도 위치 자동 저장
========================= */
map.on("moveend", ()=>{
  const c = map.getCenter();
  localStorage.setItem("mapLat", c.lat);
  localStorage.setItem("mapLng", c.lng);
});

/* =========================
6. 지도 위치 복원 강화
========================= */
(function(){
  const lat = localStorage.getItem("mapLat");
  const lng = localStorage.getItem("mapLng");
  if(lat && lng){
    map.setView([Number(lat),Number(lng)],15);
  }
})();

/* =========================
7. 로그인 버튼 보호 (연타 방지)
========================= */
let __LOGIN_LOCK = false;

async function safeLogin(){
  if(__LOGIN_LOCK) return;
  __LOGIN_LOCK = true;
  try{
    await login();
  }finally{
    setTimeout(()=>__LOGIN_LOCK=false,1000);
  }
}

document.querySelector("button[onclick='login()']").onclick = safeLogin;

/* =========================
8. 자동 로그아웃 (장시간 미사용)
========================= */
let __LAST_ACTIVITY = Date.now();

document.addEventListener("mousemove",()=>__LAST_ACTIVITY=Date.now());
document.addEventListener("keydown",()=>__LAST_ACTIVITY=Date.now());

setInterval(()=>{
  if(token && Date.now() - __LAST_ACTIVITY > 1000*60*30){
    logout();
    alert("자동 로그아웃");
  }
},60000);

/* =========================
9. 토큰 유효성 재검증 루프
========================= */
setInterval(()=>{
  try{
    if(!token) return;
    const payload = JSON.parse(atob(token.split(".")[1]));
    if(payload.exp * 1000 < Date.now()){
      logout();
    }
  }catch{}
},10000);

/* =========================
10. 지도 마커 클릭 애니메이션
========================= */
map.on("click", ()=>{
  const el = document.getElementById("map");
  el.style.transform="scale(0.99)";
  setTimeout(()=>el.style.transform="",100);
});

/* =========================
11. API 실패 누적 보호
========================= */
let __API_FAIL = 0;

async function apiSafeGuard(url,opt){
  const res = await api(url,opt);
  if(res.ok===false){
    __API_FAIL++;
  }else{
    __API_FAIL=0;
  }

  if(__API_FAIL>=5){
    alert("서버 오류 누적");
    __API_FAIL=0;
  }

  return res;
}

/* =========================
12. 상태 로그 강화
========================= */
function logState(){
  console.log("STATE:",{
    token:!!token,
    USER_CACHE,
    mapCenter: map.getCenter()
  });
}
setInterval(logState,15000);

/* =========================
13. 긴급 초기화
========================= */
function emergencyReset(){
  localStorage.clear();
  sessionStorage.clear();
  location.reload();
}

</script>
</script>

</body>
</html>
