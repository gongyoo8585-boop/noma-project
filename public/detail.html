<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>맛집 PRO</title>
<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}
header {
  background:black;
  padding:10px;
}
input {
  padding:5px;
}
button {
  padding:6px 10px;
  margin-left:5px;
  cursor:pointer;
}
#map {
  height:400px;
}
</style>
</head>
<body>

<header>
  <input id="id" placeholder="아이디">
  <input id="pw" placeholder="비밀번호" type="password">
  <button onclick="register()">회원가입</button>
  <button onclick="login()">로그인</button>
  <button onclick="kakao()">카카오 로그인</button>
</header>

<div id="map"></div>

<script>

/* ===========================
   회원가입
=========================== */
function register() {
  fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:document.getElementById("id").value,
      password:document.getElementById("pw").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    alert(data.msg);
  });
}

/* ===========================
   로그인
=========================== */
function login() {
  fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id:document.getElementById("id").value,
      password:document.getElementById("pw").value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.token){
      localStorage.setItem("token", data.token);
      alert("로그인 성공");
    } else {
      alert("실패");
    }
  });
}

/* ===========================
   카카오 로그인
=========================== */
function kakao() {
  window.location.href = "/kakao";
}

</script>

</body>
</html>
